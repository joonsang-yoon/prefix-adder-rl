name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Cache Mill and Coursier
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/mill
            ~/.cache/coursier
          key: ${{ runner.os }}-mill-${{ hashFiles('build.mill.scala', '.mill-version') }}
          restore-keys: |
            ${{ runner.os }}-mill-

      - name: Check formatting
        run: make check-format

      - name: Run unit tests
        run: make test

      - name: Smoke test synthetic evaluation
        run: make smoke-evaluate

      - name: Smoke test synthetic tabular search
        run: make smoke-search-tabular WIDTH=4 SMOKE_EPISODES=2

      - name: Smoke test synthetic deep search
        run: make smoke-search-deep WIDTH=4 SMOKE_EPISODES=2 HIDDEN_SIZE=16
